name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java (required for Android build)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Install Android SDK
      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      # 4. Accept SDK licenses
      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # 5. Install required SDK components
      - name: Install SDK packages
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "build-tools;34.0.0"

      # 6. Download Gradle manually (NO wrapper needed)
      - name: Download Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip gradle-8.2-bin.zip

      # 7. Build APK
      - name: Build Debug APK
        run: |
          ./gradle-8.2/bin/gradle assembleDebug

      # 8. Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HappyDay-APK
          path: app/build/outputs/apk/debug/app-debug.apk
